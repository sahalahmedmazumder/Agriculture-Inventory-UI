<!DOCTYPE html>
<html>
<head>
<title>Supplier Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
Supplier Dashboard
</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>Receive Harvested Crops</h3>
<p>Collect crops from farmers.</p>

<a href="supplierrecieve.html">
<button>Submit</button>
</a>

</div>

</div>

<br>

<input type="text" id="searchInput" placeholder="Search product">
<button onclick="searchData()">Search</button>

<h2>Supplier Records</h2>

<table border="1" cellpadding="10" cellspacing="0" width="100%">
<thead>
<tr>
<th>Crop/Product</th>
<th>Farmer/Supplier</th>
<th>Quantity</th>
<th>Delivery Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="supplierTable"></tbody>

</table>

<a class="backbtn" href="index.html">⬅ Agricultural Inventory Management System</a>

</div>

<script>
if (!localStorage.getItem("supplierData")) {
    const exampleData = [
        { crop: "Wheat", farmer: "Rahim", qty: 200, date: "2026-03-28" },
        { crop: "Rice", farmer: "Ali", qty: 150, date: "2026-03-30" },
        { crop: "Maize", farmer: "Sara", qty: 300, date: "2026-04-01" }
    ];
    localStorage.setItem("supplierData", JSON.stringify(exampleData));
}

function loadData() {
    let data = JSON.parse(localStorage.getItem("supplierData")) || [];
    let tableBody = document.getElementById("supplierTable");

    tableBody.innerHTML = "";

    data.forEach((item, index) => {
        let row = document.createElement("tr");

        row.innerHTML = `
            <td>${item.crop}</td>
            <td>${item.farmer}</td>
            <td>${item.qty}</td>
            <td>${item.date}</td>
            <td>
                <button class="editBtn" data-index="${index}">Edit</button>
                <button class="deleteBtn" data-index="${index}">Delete</button>
            </td>
        `;

        tableBody.appendChild(row);
    });

    document.querySelectorAll(".deleteBtn").forEach(btn => {
        btn.addEventListener("click", function() {
            let index = this.getAttribute("data-index");
            deleteRow(index);
        });
    });

    document.querySelectorAll(".editBtn").forEach(btn => {
        btn.addEventListener("click", function() {
            let index = this.getAttribute("data-index");
            editRow(index);
        });
    });
}

function deleteRow(index) {
    let data = JSON.parse(localStorage.getItem("supplierData")) || [];
    data.splice(index, 1);
    localStorage.setItem("supplierData", JSON.stringify(data));
    loadData();
}

function editRow(index) {
    let data = JSON.parse(localStorage.getItem("supplierData")) || [];
    let item = data[index];

    let crop = prompt("Edit Crop/Product:", item.crop);
    let farmer = prompt("Edit Farmer/Supplier:", item.farmer);
    let qty = prompt("Edit Quantity:", item.qty);
    let date = prompt("Edit Delivery Date:", item.date);

    if (crop && farmer && qty && date) {
        data[index] = { crop, farmer, qty, date };
        localStorage.setItem("supplierData", JSON.stringify(data));
        loadData();
    }
}

function searchData() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let rows = document.querySelectorAll("#supplierTable tr");

    rows.forEach(row => {
        let text = row.cells[0].innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}

document.addEventListener("DOMContentLoaded", loadData);
</script>

</body>
</html>
