<!DOCTYPE html>
<html>
<head>
<title>Submit Crop Information</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
Submit Crop Information
</div>

<div class="main">

<div class="card">

<h3>Submit Crop Data</h3>

<form onsubmit="saveData(event)">

<label>Crop Type</label><br>
<input type="text" id="crop" required><br><br>

<label>Quantity</label><br>
<input type="number" id="qty" required><br><br>

<label>Unit</label><br>
<select id="unit">
<option>kg</option>
<option>ton</option>
<option>box</option>
</select><br><br>

<label>Harvest Date</label><br>
<input type="date" id="date" required><br><br>

<button type="submit">Submit</button>

</form>

</div>

</div>

<script>
function saveData(e) {
    e.preventDefault();

    let crop = document.getElementById("crop").value;
    let qty = document.getElementById("qty").value;
    let unit = document.getElementById("unit").value;
    let date = document.getElementById("date").value;

    let data = JSON.parse(localStorage.getItem("cropData")) || [];

    data.push({ crop, qty, unit, date });

    localStorage.setItem("cropData", JSON.stringify(data));

    // Go back to first page
    window.location.href = "index.html";
}
</script>

</body>
</html>
