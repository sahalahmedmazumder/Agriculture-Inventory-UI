<!DOCTYPE html>
<html>
<head>
<title>Farmer Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
Farmer Dashboard
</div>

<div class="main">

<div class="cards">

<!-- Only ONE card -->
<div class="card">
<h3>Submit Crop Information</h3>
<p>Enter crop type, quantity and harvest date.</p>

<a href="Submitfarmer.html">
<button>Submit</button>
</a>

</div>

</div>

<br>

<input type="text" id="searchInput" placeholder="Search crop">
<button onclick="searchData()">Search</button>

<h2>Submitted Crop Data</h2>

<table border="1" cellpadding="10" cellspacing="0" width="100%">
<thead>
<tr>
<th>Crop Type</th>
<th>Quantity</th>
<th>Unit</th>
<th>Harvest Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="dataTable"></tbody>

</table>

<a class="backbtn" href="index.html">⬅ Agricultural Inventory Management System</a>

</div>

<script>
window.onload = function() {
    let data = JSON.parse(localStorage.getItem("cropData"));

    // Preload data if empty
    if (!data || data.length === 0) {
        data = [
            {crop: "Rice", qty: 100, unit: "kg", date: "2026-04-01"},
            {crop: "Wheat", qty: 50, unit: "kg", date: "2026-03-28"},
            {crop: "Corn", qty: 75, unit: "kg", date: "2026-04-05"}
        ];
        localStorage.setItem("cropData", JSON.stringify(data));
    }

    loadTable(data);
}

function loadTable(data) {
    let table = document.getElementById("dataTable");
    table.innerHTML = "";

    data.forEach((item, index) => {
        let row = `<tr>
            <td>${item.crop}</td>
            <td>${item.qty}</td>
            <td>${item.unit}</td>
            <td>${item.date}</td>
            <td>
                <button onclick="editRow(${index})">Edit</button>
                <button onclick="deleteRow(${index})">Delete</button>
            </td>
        </tr>`;
        table.innerHTML += row;
    });
}

function deleteRow(index) {
    let data = JSON.parse(localStorage.getItem("cropData")) || [];
    data.splice(index, 1);
    localStorage.setItem("cropData", JSON.stringify(data));
    loadTable(data);
}

function editRow(index) {
    let data = JSON.parse(localStorage.getItem("cropData")) || [];
    let item = data[index];

    let crop = prompt("Edit Crop Type:", item.crop);
    let qty = prompt("Edit Quantity:", item.qty);
    let unit = prompt("Edit Unit:", item.unit);
    let date = prompt("Edit Date:", item.date);

    if (crop && qty && unit && date) {
        data[index] = {crop, qty, unit, date};
        localStorage.setItem("cropData", JSON.stringify(data));
        loadTable(data);
    }
}

function searchData() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let rows = document.querySelectorAll("#dataTable tr");

    rows.forEach(row => {
        let crop = row.cells[0].innerText.toLowerCase();
        row.style.display = crop.includes(input) ? "" : "none";
    });
}
</script>

</body>
</html>
